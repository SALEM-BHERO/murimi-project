<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Profile - Murimi</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2c5926",
                        "background-light": "#f8faf8",
                        "background-dark": "#0f140f",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "2xl": "1.5rem", "3xl": "2rem" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }

        .dark .glass-card {
            background: rgba(22, 29, 21, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div class="relative flex min-h-screen w-full flex-col">
        <!-- Header -->
        <header class="p-8 pb-4 text-center animate-slide-up">
            <div class="relative inline-block mb-6">
                <div
                    class="size-36 rounded-[3rem] border-4 border-white dark:border-slate-800 overflow-hidden shadow-2xl">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?fit=crop&q=80&w=300"
                        class="w-full h-full object-cover" />
                </div>
                <button
                    class="absolute -bottom-2 -right-2 bg-primary text-white p-3 rounded-2xl shadow-xl hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-sm">edit</span>
                </button>
            </div>
            <h1 class="text-3xl font-black mb-1 tracking-tight">Farai Murimi</h1>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-[10px]">Premium Member • Harare, ZW</p>
        </header>

        <main class="px-6 space-y-8 pb-32">
            <!-- Settings Groups -->
            <section class="animate-slide-up stagger-1">
                <h3 class="font-black text-[10px] uppercase tracking-[0.2em] text-slate-400 mb-4 px-4">Account Settings
                </h3>
                <div class="space-y-3">
                    <button class="w-full glass-card p-5 rounded-3xl flex items-center justify-between group">
                        <div class="flex items-center gap-4">
                            <div
                                class="size-10 bg-primary/10 rounded-2xl flex items-center justify-center text-primary">
                                <span class="material-symbols-outlined text-[22px]">language</span>
                            </div>
                            <span class="font-bold text-slate-700 dark:text-slate-200">Language</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-black text-slate-400 uppercase tracking-widest">English</span>
                            <span class="material-symbols-outlined text-slate-300">chevron_right</span>
                        </div>
                    </button>
                    <button class="w-full glass-card p-5 rounded-3xl flex items-center justify-between group">
                        <div class="flex items-center gap-4">
                            <div
                                class="size-10 bg-primary/10 rounded-2xl flex items-center justify-center text-primary">
                                <span class="material-symbols-outlined text-[22px]">dark_mode</span>
                            </div>
                            <span class="font-bold text-slate-700 dark:text-slate-200">Dark Mode</span>
                        </div>
                        <div
                            class="w-12 h-6 bg-slate-200 dark:bg-primary/20 rounded-full relative p-1 transition-colors">
                            <div class="size-4 bg-white dark:bg-primary rounded-full shadow-sm"></div>
                        </div>
                    </button>
                </div>
            </section>

            <section class="animate-slide-up stagger-2">
                <h3 class="font-black text-[10px] uppercase tracking-[0.2em] text-slate-400 mb-4 px-4">Security & Logout
                </h3>
                <div class="space-y-3">
                    <button class="w-full glass-card p-5 rounded-3xl flex items-center justify-between group">
                        <div class="flex items-center gap-4 text-red-500">
                            <div
                                class="size-10 bg-red-50 dark:bg-red-500/10 rounded-2xl flex items-center justify-center">
                                <span class="material-symbols-outlined text-[22px]">logout</span>
                            </div>
                            <span class="font-bold">Log Out</span>
                        </div>
                    </button>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav
            class="fixed bottom-6 left-6 right-6 h-20 glass-card rounded-3xl px-8 flex justify-between items-center z-50 premium-shadow">
            <a class="flex flex-col items-center gap-1.5 text-slate-400 hover:text-primary transition-all"
                href="index.html">
                <span class="material-symbols-outlined text-[26px]">home</span>
                <span class="text-[9px] font-black uppercase tracking-widest" data-t="home">Home</span>
            </a>
            <a class="flex flex-col items-center gap-1.5 text-slate-400 hover:text-primary transition-all"
                href="shops.html">
                <span class="material-symbols-outlined text-[26px]">shopping_bag</span>
                <span class="text-[9px] font-black uppercase tracking-widest" data-t="shop">Shop</span>
            </a>
            <a class="flex flex-col items-center gap-1.5 text-slate-400 hover:text-primary transition-all"
                href="knowledge.html">
                <span class="material-symbols-outlined text-[26px]">menu_book</span>
                <span class="text-[9px] font-black uppercase tracking-widest" data-t="knowledge">Knowledge</span>
            </a>
            <a class="flex flex-col items-center gap-1.5 text-primary scale-110 transition-all" href="profile.html">
                <span class="material-symbols-outlined text-[26px]"
                    style="font-variation-settings: 'FILL' 1">person</span>
                <span class="text-[9px] font-black uppercase tracking-widest" data-t="profile">Profile</span>
            </a>
        </nav>
    </div>
    <script src="app.js"></script>
</body>

</html>
