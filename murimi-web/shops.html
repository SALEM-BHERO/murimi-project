<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Stockists - Murimi</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2c5926",
                        "background-light": "#f8faf8",
                        "background-dark": "#0f140f",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "2xl": "1.5rem", "3xl": "2rem" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }

        .dark .glass-card {
            background: rgba(22, 29, 21, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div class="relative flex min-h-screen w-full flex-col overflow-hidden">
        <!-- Search Header -->
        <header class="p-8 pb-4 relative z-50">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl font-black tracking-tight" data-t="shop_finder">Shop Finder</h1>
                <button id="lang-menu-btn"
                    class="size-10 glass-card rounded-2xl flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined text-[20px]">language</span>
                </button>
            </div>

            <div class="glass-card p-2 rounded-3xl flex items-center gap-3 pr-6 group border-primary/20 bg-primary/5">
                <div
                    class="size-12 bg-primary rounded-2xl flex items-center justify-center text-white shrink-0 shadow-lg">
                    <span class="material-symbols-outlined">search</span>
                </div>
                <input
                    class="flex-1 bg-transparent border-none focus:ring-0 text-slate-900 dark:text-white font-bold placeholder:text-slate-400"
                    placeholder="Search stockists..." type="text" value="Harare CBD" />
            </div>
        </header>

        <main class="flex-1 relative">
            <div class="absolute inset-0 bg-cover bg-center"
                style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCpYG-oUGAe4dDiX8bn_Y-MU02e4loTN-25CB7sO8OrZQ_e7RouhrUoawa0WI8Gt_-idkZeeocCBItuWxNxVPDYf4H4xkd53iCj4UOXcBOg8GXIxNt2hWU6SRLwLC-Pxnx37e2j-vUOT3hMjKKOPM2jKXdMsSLGQAnf0Sq7gmiNeRqo8wy4jPyLWNgzmJQREPNJTqLPmmcUr1gNLrJStK-8EqkjQJlqXSrUH__D9HAZwV2rl7gBfrxMceH_atUWH99DJzD7jBDq49E');">
                <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2">
                    <div class="relative flex flex-col items-center">
                        <div class="bg-primary text-white px-3 py-1 rounded-full text-xs font-bold shadow-lg mb-1"
                            data-t="greenagro_stockists">GreenAgro</div>
                        <span class="material-symbols-outlined text-primary text-4xl drop-shadow-md"
                            style="font-variation-settings: 'FILL' 1">location_on</span>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 p-4 z-30 mb-20">
                <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-[0_-8px_30px_rgb(0,0,0,0.12)] p-6">
                    <div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-6"></div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span
                                class="inline-block px-2 py-1 bg-primary/10 text-primary text-[10px] font-bold rounded uppercase tracking-wider mb-2"
                                data-t="nearest_stockist">Nearest
                                Stockist</span>
                            <h2 class="text-2xl font-bold text-slate-900 dark:text-white" data-t="greenagro_stockists">
                                GreenAgro Stockists</h2>
                            <p class="text-slate-500 dark:text-slate-400 flex items-center gap-1 text-sm mt-1">
                                <span class="material-symbols-outlined text-sm">near_me</span> <span
                                    data-t="distance_away">1.2km away • CBD, Harare</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass-nav px-6 pb-8 pt-4 flex justify-between items-center z-50">
            <a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors"
                href="index.html">
                <span class="material-symbols-outlined">home</span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Home</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-primary transition-colors" href="shops.html">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">shopping_bag</span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Shop</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors"
                href="knowledge.html">
                <span class="material-symbols-outlined">menu_book</span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Knowledge</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors"
                href="profile.html">
                <span class="material-symbols-outlined">person</span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Profile</span>
            </a>
        </nav>

        <!-- Language Menu Modal -->
        <div id="lang-modal" class="fixed inset-0 bg-black/50 z-[100] hidden items-end justify-center">
            <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-t-3xl p-6 pb-12">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold" data-t="select_language">Select Language</h3>
                    <button id="close-lang-modal" class="p-2 text-slate-400 hover:text-slate-900">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <div class="space-y-3">
                    <button
                        class="lang-option w-full flex items-center gap-4 p-4 rounded-xl border border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50"
                        data-lang="en">
                        <span class="text-2xl">🇬🇧</span>
                        <span class="font-semibold">English</span>
                    </button>
                    <button
                        class="lang-option w-full flex items-center gap-4 p-4 rounded-xl border border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50"
                        data-lang="sn">
                        <span class="text-2xl">🇿🇼</span>
                        <span class="font-semibold">Shona</span>
                    </button>
                    <button
                        class="lang-option w-full flex items-center gap-4 p-4 rounded-xl border border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50"
                        data-lang="nd">
                        <span class="text-2xl">🇿🇼</span>
                        <span class="font-semibold">Ndebele</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
